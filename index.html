<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>GitHub Issues Tracker</title>

    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- DaisyUI + Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Login Form -->
    <div class="hidden place-items-center min-h-screen">
      <div class="card bg-base-100 w-full max-w-md shrink-0 shadow-2xl">
        <div class="card-body">
          <div class="flex flex-col items-center gap-1">
            <img class="w-24 mb-2" src="./assets/github-logo.png" alt="" />
            <h4 class="text-xl font-semibold">GitHub Issues Tracker</h4>
            <p class="text-base-content/60">Sign in to manage your issues</p>
          </div>

          <fieldset class="fieldset">
            <label class="text-base font-medium">Username</label>
            <input
              type="text"
              class="input w-full"
              placeholder="Enter Username"
            />
            <p class="text-purple-600 mb-2">Default: admin</p>

            <label class="text-base font-medium">Password</label>
            <input
              type="password"
              class="input w-full"
              placeholder="Enter Password"
            />
            <p class="text-purple-600">Default: admin123</p>
            <button class="btn btn-primary mt-4">Sign In</button>

            <div class="divider">OR</div>

            <p class="mx-auto text-sm mb-2 text-base-content/60">
              Demo Credentials:
            </p>
            <div class="bg-base-200 p-5 text-center space-y-1 rounded-sm">
              <p class="text-sm">
                <span class="font-semibold">Username:</span> admin
              </p>
              <p class="text-sm">
                <span class="font-semibold">Password:</span> admin123
              </p>
            </div>
          </fieldset>
        </div>
      </div>
    </div>

    <!-- Main Page -->
    <header>
      <nav class="navbar px-16 bg-base-100 shadow-sm">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <img class="w-7" src="./assets/github-logo.png" alt="" />
            GitHub Issues Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <label class="input">
            <i class="fa-solid fa-magnifying-glass h-[1em] opacity-50"></i>
            <input type="search" class="grow" placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </nav>
    </header>
  </body>
</html>
