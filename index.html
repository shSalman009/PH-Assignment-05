<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title + Logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- DaisyUI + Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Login Form -->
    <section id="login-section" class="grid place-items-center min-h-screen">
      <div class="card bg-base-100 w-full max-w-md shrink-0 shadow-2xl">
        <div class="card-body">
          <div class="flex flex-col items-center gap-1">
            <img class="w-24 mb-2" src="./assets/github-logo.png" alt="" />
            <h4 class="text-xl font-semibold">GitHub Issues Tracker</h4>
            <p class="text-base-content/60">Sign in to manage your issues</p>
          </div>

          <form id="login-form">
            <fieldset class="fieldset">
              <label class="text-base font-medium">Username</label>
              <input
                required
                id="username-input"
                type="text"
                class="input w-full"
                placeholder="Enter Username"
              />
              <p class="text-purple-600 mb-2">Default: admin</p>

              <label class="text-base font-medium">Password</label>
              <input
                required
                id="password-input"
                type="password"
                class="input w-full"
                placeholder="Enter Password"
              />
              <p class="text-purple-600">Default: admin123</p>
              <button type="submit" class="btn btn-primary mt-4">
                Sign In
              </button>

              <div class="divider">OR</div>

              <p class="mx-auto text-sm mb-2 text-base-content/60">
                Demo Credentials:
              </p>
              <div class="bg-base-200 p-5 text-center space-y-1 rounded-sm">
                <p class="text-sm">
                  <span class="font-semibold">Username:</span> admin
                </p>
                <p class="text-sm">
                  <span class="font-semibold">Password:</span> admin123
                </p>
              </div>
            </fieldset>
          </form>
        </div>
      </div>
    </section>

    <!-- Main Page -->
    <div id="main-section" class="hidden">
      <header>
        <nav
          class="navbar flex-col sm:flex-row px-4 md:px-16 bg-base-100 shadow-sm"
        >
          <div class="flex-1">
            <a class="btn btn-ghost text-xl">
              <img class="w-7" src="./assets/github-logo.png" alt="" />
              <span class="sm:hidden md:inline-block whitespace-nowrap"
                >GitHub Issues Tracker</span
              ></a
            >
          </div>
          <form id="search-form" class="flex gap-2">
            <label class="input">
              <i class="fa-solid fa-magnifying-glass h-[1em] opacity-50"></i>
              <input
                id="search-input"
                type="search"
                class="grow"
                placeholder="Search issues..."
              />
            </label>
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </form>
        </nav>
      </header>

      <section class="bg-base-200 py-10">
        <div class="container mx-auto">
          <div
            id="tab-buttons"
            class="bg-base-100 rounded-md space-x-1 p-5 mb-5"
          >
            <button id="tab-button" data-tab="all" class="btn btn-primary">
              All
            </button>
            <button id="tab-button" data-tab="open" class="btn">Open</button>
            <button id="tab-button" data-tab="closed" class="btn">
              Closed
            </button>
          </div>

          <div class="divide-y divide-gray-200">
            <div
              class="bg-base-100 rounded-t-md p-5 flex flex-col sm:flex-row justify-between items-center"
            >
              <div class="flex gap-2 justify-start items-center">
                <div
                  class="w-14 h-14 bg-purple-100 grid place-items-center rounded-full"
                >
                  <img class="w-9" src="./assets/Aperture.png" alt="" />
                </div>
                <div>
                  <h4 id="count-status" class="text-lg font-semibold">
                    0 Issues
                  </h4>
                  <p class="text-base-content/60">
                    Track and manage your project issues
                  </p>
                </div>
              </div>

              <div class="flex justify-end items-center gap-3">
                <div class="flex items-center gap-2">
                  <span
                    class="inline-block w-3.5 h-3.5 bg-green-600 rounded-full"
                  ></span>
                  <p class="font-medium">Open</p>
                </div>
                <div class="flex items-center gap-2">
                  <span
                    class="inline-block w-3.5 h-3.5 bg-purple-600 rounded-full"
                  ></span>
                  <p class="font-medium">Closed</p>
                </div>
              </div>
            </div>

            <div
              class="bg-base-100 rounded-b-md p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
              id="issues-container"
            ></div>
          </div>
        </div>
      </section>

      <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modal-container"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>

        <form method="dialog" class="modal-backdrop">
          <button>close</button>
        </form>
      </dialog>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
